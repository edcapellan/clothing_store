<!DOCTYPE html>
<html>
<head>
  <title>NailVerse</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .navbar {
      display: flex;
      justify-content: center;
      background-color: #2d89ef;
      padding: 16px;
      flex-wrap: wrap;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      margin: 8px 12px;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    h1 {
      text-align: center;
      margin: 30px 0 10px;
      color: #333;
    }

    h2 {
      text-align: center;
      margin: 40px 0 20px;
      color: #444;
    }

    .product-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 0 20px;
    }

    .product-card {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 220px;
      padding: 16px;
      text-align: center;
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      background-color: #eee;
    }

    .product-card h3 {
      margin: 12px 0 6px;
    }

    .product-card p {
      margin: 6px 0;
      font-size: 15px;
    }

    .product-card form button {
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #2d89ef;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }

    .product-card form button:hover {
      background-color: #1b60c5;
    }
  </style>
</head>
<body>

  <div class="navbar">
    {% for category in categories %}
      <a href="#{{ category | lower }}">{{ category }}</a>
    {% endfor %}
    <a href="{{ url_for('cart') }}">🛒 View Cart</a>
  </div>

  <h1>Welcome to NailVerse</h1>

  {% for category, items in categories.items() %}
    <h2 id="{{ category | lower }}">{{ category }}</h2>

    <div class="product-grid">
      {% for product in items %}
      <div class="product-card">

        <!-- FIXED: removed placeholder fallback -->
        <img src="{{ url_for('static', filename=product.image) }}"
             alt="{{ product.name }}">

        <h3>{{ product.name }}</h3>
        <p>${{ '%.2f'|format(product.price) }}</p>

        <form action="{{ url_for('add_to_cart') }}" method="POST">
          <input type="hidden" name="product" value="{{ product.name }}">
          <input type="hidden" name="price" value="{{ product.price }}">
          <button type="submit">Add to Cart</button>
        </form>

      </div>
      {% endfor %}
    </div>
  {% endfor %}

</body>
</html>
